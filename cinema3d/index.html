<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>午夜电影院 · 3D 剧场</title>
<style>
  :root{
    --paper:#d8cdb6; --blood:#b41f17; --blood-soft:#7e1f1a; --cold:#9fb6b2; --gold:#c9a45c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:"Noto Serif SC","Source Han Serif SC","Songti SC","SimSun",serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block}
  /* HUD 层(字幕/选项/结算)在 Task 9/11 填充,先立容器 */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10}
  /* 暗角 + 胶片颗粒:DOM overlay,零 GPU 成本(theater 移植) */
  #vig{position:fixed;inset:0;z-index:8;pointer-events:none;
    background:radial-gradient(ellipse at 50% 44%,transparent 44%,rgba(0,0,0,.62) 100%);transition:background 1s}
  #vig.tight{background:radial-gradient(ellipse at 50% 48%,transparent 22%,rgba(0,0,0,.9) 92%)}
  #grain{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:.065;mix-blend-mode:overlay;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.8"/></svg>');
    animation:gr .5s steps(2) infinite}
  @keyframes gr{0%{transform:translate(0,0)}50%{transform:translate(-3px,2px)}100%{transform:translate(2px,-3px)}}
  #blackout{position:fixed;inset:0;z-index:40;background:#000;opacity:0;pointer-events:none;transition:opacity .12s}

  /* ---- HUD:字幕 / 片名 / 顶栏 / 结算(theater 气质移植) ---- */
  #cap{position:fixed;left:8%;right:8%;bottom:11%;z-index:11;text-align:center;
    color:var(--paper);font-size:clamp(16px,2.4vw,23px);line-height:1.85;letter-spacing:.08em;min-height:2em;
    text-shadow:0 1px 4px #000,0 0 18px rgba(0,0,0,.8);opacity:0;transition:opacity .8s;pointer-events:none}
  #cap.show{opacity:1}
  #cap.rule{color:#d23b30;font-family:"KaiTi","STKaiti","楷体",serif;font-size:clamp(18px,2.8vw,26px);
    text-shadow:0 0 3px rgba(210,59,48,.9),0 0 16px rgba(170,30,24,.5)}
  #cap .ch{display:inline-block}
  #title{position:fixed;inset:0;z-index:12;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;opacity:0;transition:opacity 1.2s;pointer-events:none}
  #title.show{opacity:1}
  #title .nm{color:var(--paper);font-size:clamp(30px,6vw,50px);font-weight:900;letter-spacing:.22em;text-indent:.22em;
    text-shadow:0 0 40px rgba(216,205,182,.3)}
  #title .tg{color:#c0382f;font-family:"KaiTi","STKaiti","楷体",serif;font-size:clamp(14px,2vw,19px);letter-spacing:.2em;margin-top:18px}
  #marquee{position:fixed;top:2.4%;left:50%;transform:translateX(-50%);z-index:11;color:var(--gold);font-size:12px;
    letter-spacing:.5em;text-indent:.5em;white-space:nowrap;opacity:0;transition:opacity 1.2s;border:1px solid #3a2f22;
    background:rgba(8,7,5,.7);padding:5px 20px;pointer-events:none}
  #deadBanner{position:fixed;top:8%;left:50%;transform:translateX(-50%);z-index:12;color:#8a8494;font-size:13px;
    letter-spacing:.4em;text-indent:.4em;opacity:0;transition:opacity 1.5s;pointer-events:none;
    text-shadow:0 0 12px rgba(0,0,0,.9)}
  /* 倒计时呼吸圈 */
  #countRing{position:fixed;right:6%;bottom:12%;z-index:12;width:64px;height:64px;opacity:0;transition:opacity .5s;pointer-events:none}
  #countRing svg{transform:rotate(-90deg)}
  #countRing .bgc{fill:none;stroke:#2a2434;stroke-width:5}
  #countRing .fgc{fill:none;stroke:#b41f17;stroke-width:5;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(180,31,23,.6))}
  /* 结算卡 */
  #settle{position:fixed;inset:0;z-index:25;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;background:rgba(2,2,3,.78);text-align:center}
  #settle.show{display:flex}
  #settle .sv{color:var(--paper);font-size:clamp(18px,2.6vw,24px);letter-spacing:.12em;line-height:2;max-width:80%}
  #settle .st{color:#6c6457;font-size:13px;letter-spacing:.3em}
  #settle button,.gateBtn{background:transparent;border:1px solid var(--blood);color:#d8cfba;font-family:inherit;
    padding:12px 44px;font-size:15px;letter-spacing:.4em;text-indent:.4em;cursor:pointer;transition:all .4s}
  #settle button:hover,.gateBtn:hover{background:rgba(180,31,23,.16);box-shadow:0 0 26px rgba(180,31,23,.25)}
  /* 入场页(最小版,T11 美化) */
  #gate{position:fixed;inset:0;z-index:30;background:#020203;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:26px;transition:opacity 1.4s}
  #gate h1{color:var(--paper);font-size:clamp(24px,5vw,32px);letter-spacing:.42em;text-indent:.42em;font-weight:900;
    text-shadow:0 0 36px rgba(216,205,182,.28)}
  #gate p{color:#6c6457;font-size:12.5px;letter-spacing:.28em}
  #gate .btns{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .gateBtn.dim2{border-color:#34291c;color:#6a6154;cursor:not-allowed}
  .filmTag{font-size:12px;letter-spacing:.2em;padding:5px 14px;border:1px solid #3a2f22}
  .filmTag.on{color:var(--gold);border-color:#5a4326}
  .filmTag.off{color:#4a443a;cursor:not-allowed}
  #loadTip{color:#6c6457;font-size:11.5px;min-height:1.2em}
  #ctrlTip{color:#4f4a41;font-size:11.5px;text-align:center}
  @media (max-width:820px){ #ctrlTip{display:none} }
  /* 试玩选项按钮(底部) */
  #choices{position:fixed;left:50%;bottom:20%;transform:translateX(-50%);z-index:14;display:none;gap:16px}
  #choices.show{display:flex}
  #choices button{background:rgba(10,9,7,.85);border:1px solid #5a2a22;color:#d8cfba;font-family:inherit;
    font-size:15px;letter-spacing:.2em;padding:10px 26px;cursor:pointer;transition:all .25s}
  #choices button:hover,#choices button.on{background:rgba(180,31,23,.22);border-color:var(--blood)}
  /* 屏息提示 */
  #holdHint{position:fixed;left:50%;bottom:22%;transform:translateX(-50%);z-index:14;color:#9fb6b2;
    font-size:14px;letter-spacing:.3em;opacity:0;transition:opacity .4s;pointer-events:none;
    text-shadow:0 0 14px rgba(0,0,0,.9)}
  #holdHint.show{opacity:.9}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="vig"></div>
<div id="grain"></div>
<div id="hud">
  <div id="marquee"></div>
  <div id="cap"></div>
  <div id="title"></div>
  <div id="deadBanner">你已化作黑雾 · 旁观中</div>
  <div id="countRing"><svg viewBox="0 0 64 64" width="64" height="64">
    <circle class="bgc" cx="32" cy="32" r="27"/>
    <circle class="fgc" cx="32" cy="32" r="27" stroke-dasharray="169.6" stroke-dashoffset="0"/>
  </svg></div>
  <div id="holdHint"></div>
</div>
<div id="choices"></div>
<div id="settle">
  <div class="sv"></div>
  <div class="st"></div>
  <button id="again">再 来 一 场</button>
</div>
<div id="gate">
  <h1>午夜电影院</h1>
  <p>3D 剧场 · 戴上耳机</p>
  <div id="filmPick" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <span class="filmTag on">无声疗养院</span>
    <span class="filmTag off">镜中人 · 未上映</span>
    <span class="filmTag off">最后一排 · 未上映</span>
  </div>
  <div class="btns">
    <button class="gateBtn" id="btnWatch">只看放映</button>
    <button class="gateBtn" id="btnPlay">入座试玩</button>
  </div>
  <p id="loadTip" style="letter-spacing:.2em"></p>
  <p id="ctrlTip" style="letter-spacing:.15em;line-height:2">入座试玩:W A S D · 走进影厅　E · 入座　空格 · 屏息　　入座后 Tab · 切换视角</p>
  <p id="buildVer" style="position:fixed;right:14px;bottom:10px;color:#3a352c;font-size:11px;letter-spacing:.15em">build r10 · 0714-1519 · c4151ee</p>
</div>
<button id="mute" style="position:fixed;top:14px;right:16px;z-index:31;background:rgba(10,9,7,.7);border:1px solid #34291c;color:#9a8f76;font-size:15px;padding:5px 12px;cursor:pointer">🔊</button>
<div id="flash" style="position:fixed;inset:0;z-index:39;background:#fff;opacity:0;pointer-events:none"></div>
<div id="blackout"></div>
<script type="importmap">
{
  "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/addons/"
  }
}
</script>
<script type="module" src="./src-r10/main.js"></script>
</body>
</html>
